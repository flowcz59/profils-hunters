<title>Chasseur de têtes — COBOL &amp; Java · Hauts-de-France</title>
<style>
/* =============================================================================
   Galaxie · France Télévisions Design System
   Colors + Type foundations
   ----------------------------------------------------------------------------
   Galaxie uses a layered semantic token system: each token is named
   color.{layer}.{fonction}.{intensité}.{état}, e.g.
     color.bg.neutral.weakest.static
     color.fg.onAccent.base.static
     color.bg.success.stronger.hover
   The vars below are a flattened, framework-agnostic subset that's enough
   to recreate any Confluence/Slide/UI surface we found in the Figma source.
   ========================================================================= */

/* ─── FranceTV Brown — brand workhorse (licensed, shipped in /fonts) ──── */





/* UI illustrative fonts (still pulled from Google) */


:root {
  /* ----------------------------------------------------------------------
     Brand · core
     -------------------------------------------------------------------- */
  --galaxie-blue: #2c69f6;       /* primary action / link / accent */
  --galaxie-blue-hover: #1e54d6;
  --galaxie-blue-soft: #678ee8;  /* secondary blue */

  /* Atelier / brand accents pulled from cover & carousel headers */
  --accent-pink:   #ef51fa;   /* "Atelier" headline pink */
  --accent-magenta:#b748ab;   /* button accent magenta */
  --accent-purple: #b481f7;   /* handwritten highlight ("Permanent Marker" text) */
  --accent-violet: #d6b9ee;
  --accent-yellow: #ffc300;   /* franceinfo / outre-mer yellow */
  --accent-cyan:   #007a97;
  --accent-orange: #fa794e;   /* memo card border, "do/don't" warm tone */
  --accent-red:    #d0021b;   /* Don't  */
  --accent-amber:  #ffa51f;   /* Caution */
  --accent-green:  #037115;   /* Do */
  --accent-success:#0b9962;   /* color.bg.success.* */

  /* Memo gradient (do/don't memos) */
  --memo-gradient: radial-gradient(circle at 30% 50%, #fa8818 0%, #ed3e7b 100%);

  /* ----------------------------------------------------------------------
     Neutrals — black-to-white scale (Galaxie uses MANY neutral steps)
     -------------------------------------------------------------------- */
  --ink-abyss:   #0e1114;   /* color.bg.neutral.base.static */
  --ink-1000:    #0d0d0d;
  --ink-900:     #1e1e1e;
  --ink-850:     #202020;
  --ink-800:     #282828;
  --ink-750:     #2d3537;
  --ink-700:     #323232;
  --ink-650:     #414141;
  --ink-600:     #424242;
  --ink-500:     #636466;
  --ink-450:     #72757e;
  --ink-400:     #8c8e97;
  --ink-350:     #959595;
  --ink-300:     #b5b5b5;
  --ink-250:     #cccccc;
  --ink-200:     #d9d9d9;
  --ink-150:     #dedee8;
  --ink-100:     #f8f8f8;
  --ink-50:      #fafbff;
  --ink-0:       #ffffff;

  /* ----------------------------------------------------------------------
     Semantic colors — flat aliases used by components
     -------------------------------------------------------------------- */
  /* Backgrounds */
  --color-bg-neutral-base:     var(--ink-abyss);
  --color-bg-neutral-weakest:  var(--ink-100);
  --color-bg-neutral-weaker:   var(--ink-200);
  --color-bg-neutral-stronger: var(--ink-800);
  --color-bg-neutral-strongest:var(--ink-1000);
  --color-bg-accent:           var(--galaxie-blue);
  --color-bg-accent-stronger:  var(--galaxie-blue-hover);
  --color-bg-success:          var(--accent-success);
  --color-bg-warning:          var(--accent-amber);
  --color-bg-danger:           var(--accent-red);
  --color-bg-info:             var(--galaxie-blue);

  /* Foreground / text */
  --color-fg-neutral-base:     var(--ink-abyss);
  --color-fg-neutral-strong:   var(--ink-850);
  --color-fg-neutral-weak:     var(--ink-500);
  --color-fg-neutral-weaker:   var(--ink-400);
  --color-fg-onNeutral-base:   var(--ink-0);
  --color-fg-onAccent-base:    var(--ink-0);
  --color-fg-accent:           var(--galaxie-blue);
  --color-fg-success:          var(--accent-green);
  --color-fg-warning:          var(--accent-amber);
  --color-fg-danger:           var(--accent-red);

  /* Strokes */
  --color-stroke-neutral-weak:    rgba(0, 0, 0, 0.1);
  --color-stroke-neutral-base:    var(--ink-200);
  --color-stroke-neutral-strong:  var(--ink-600);
  --color-stroke-accent:          var(--galaxie-blue);

  /* Do/Don't/Caution surface tints (from memo template) */
  --do-bg:      #effcf0;
  --dont-bg:    #ffece9;
  --caution-bg: #fffaee;

  /* ----------------------------------------------------------------------
     Type families
     -------------------------------------------------------------------- */
  --font-brand: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", system-ui, sans-serif;
  --font-body:  -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", system-ui, sans-serif;
  --font-mono:  "SF Mono", "Roboto Mono", "Menlo", monospace;
  --font-marker:-apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", system-ui, sans-serif;   /* highlight accent — always used italic 700, color: --accent-purple */
  --font-ui:    "SF Pro", "Inter", system-ui, sans-serif;
  --font-roboto:"Roboto", system-ui, sans-serif;

  /* ----------------------------------------------------------------------
     Type scale (Galaxie uses very large display sizes on covers,
     and a tight body scale in product UIs)
     -------------------------------------------------------------------- */
  --fs-display-2xl: 130px;  /* Cover titles */
  --fs-display-xl:  96px;
  --fs-display-l:   72px;   /* "Atelier" headline */
  --fs-display-m:   60px;
  --fs-h1:          40px;
  --fs-h2:          32px;
  --fs-h3:          24px;
  --fs-h4:          20px;
  --fs-h5:          18px;
  --fs-body:        16px;
  --fs-body-sm:     14px;
  --fs-caption:     12px;

  --lh-display:     1.0;
  --lh-tight:       1.1;
  --lh-snug:        1.25;
  --lh-body:        1.45;

  --fw-light:    300;
  --fw-regular:  400;
  --fw-medium:   500;
  --fw-bold:     700;

  /* ----------------------------------------------------------------------
     Spacing — between / around / layout
     -------------------------------------------------------------------- */
  --sp-2xs: 4px;
  --sp-xs:  8px;
  --sp-s:   12px;
  --sp-m:   16px;
  --sp-l:   24px;
  --sp-xl:  32px;
  --sp-2xl: 48px;
  --sp-3xl: 64px;

  /* ----------------------------------------------------------------------
     Radii
     -------------------------------------------------------------------- */
  --r-xs:   2px;
  --r-s:    4px;
  --r-m:    8px;
  --r-l:    10px;
  --r-xl:   16px;
  --r-2xl:  24px;
  --r-pill: 9999px;

  /* ----------------------------------------------------------------------
     Borders
     -------------------------------------------------------------------- */
  --bw-xs:  1px;
  --bw-s:   2px;
  --bw-m:   3px;
  --bw-l:   7px;   /* memo card thick border */
  --bw-xl:  11px;  /* picto strokes */

  /* ----------------------------------------------------------------------
     Shadows
     -------------------------------------------------------------------- */
  --shadow-s:  0 1px 2px rgba(14, 17, 20, 0.06), 0 1px 3px rgba(14, 17, 20, 0.10);
  --shadow-m:  0 4px 12px rgba(14, 17, 20, 0.08), 0 2px 4px rgba(14, 17, 20, 0.06);
  --shadow-l:  0 16px 40px rgba(14, 17, 20, 0.14), 0 4px 8px rgba(14, 17, 20, 0.08);
  --shadow-focus: 0 0 0 3px rgba(44, 105, 246, 0.35);
}

/* ============================================================================
   Type styles · semantic
   ========================================================================= */

body {
  font-family: var(--font-body);
  font-size: var(--fs-body);
  line-height: var(--lh-body);
  color: var(--color-fg-neutral-base);
  background: var(--ink-0);
  -webkit-font-smoothing: antialiased;
}

.gx-display, .gx-cover-title {
  font-family: var(--font-brand);
  font-weight: var(--fw-bold);
  font-size: var(--fs-display-2xl);
  line-height: 125px;
  letter-spacing: -0.01em;
}

.gx-h1 { font-family: var(--font-brand); font-weight: 700; font-size: var(--fs-h1); line-height: var(--lh-tight); }
.gx-h2 { font-family: var(--font-brand); font-weight: 700; font-size: var(--fs-h2); line-height: var(--lh-display); }
.gx-h3 { font-family: var(--font-brand); font-weight: 700; font-size: var(--fs-h3); line-height: var(--lh-display); }
.gx-h4 { font-family: var(--font-brand); font-weight: 700; font-size: var(--fs-h4); line-height: var(--lh-snug); }
.gx-h5 { font-family: var(--font-brand); font-weight: 700; font-size: var(--fs-h5); line-height: var(--lh-snug); }

.gx-body    { font-family: var(--font-body); font-size: var(--fs-body); line-height: var(--lh-body); }
.gx-body-sm { font-family: var(--font-body); font-size: var(--fs-body-sm); line-height: var(--lh-body); }
.gx-body-bold { font-family: var(--font-body); font-weight: 700; font-size: var(--fs-body); line-height: var(--lh-body); }
.gx-caption { font-family: var(--font-body); font-size: var(--fs-caption); line-height: 1.4; color: var(--color-fg-neutral-weak); }

/* Highlight accent — italic Bold of the brand font, in purple.
   Used for "Merci", quoted highlights, hero marker words. Replaces the older Permanent Marker treatment. */
.gx-marker {
  font-family: var(--font-marker); font-style: italic; font-weight: 700;
  color: var(--accent-purple);
  line-height: 1;
  letter-spacing: -0.01em;
}

.gx-mono   { font-family: var(--font-mono); font-size: var(--fs-body-sm); }
.gx-token  { font-family: var(--font-mono); font-size: 14px; background: var(--ink-800); color: var(--ink-0); padding: 4px 8px; border-radius: var(--r-s); display: inline-block; }

/* =============================================================================
   styles.css — Chasseur de têtes (Galaxie · CRM sobre, clair)
   ========================================================================= */
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f6f8;
  --surface: #ffffff;
  --line: #e7e9ee;
  --line-soft: #eef0f3;
  --txt: #14181d;
  --txt-2: #5d636e;
  --txt-3: #9aa0ab;
  --blue: var(--galaxie-blue);
  --topbar-h: 60px;
}
html, body { height: 100%; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--txt);
  -webkit-font-smoothing: antialiased;
  font-size: 14px;
}
#root, .app { height: 100%; }
.app { display: flex; flex-direction: column; }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }
::selection { background: rgba(44,105,246,.18); }

/* ---- boutons ----------------------------------------------------------- */
.btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 18px; border-radius: 9999px;
  font-family: var(--font-body); font-weight: 700; font-size: 14px; border: 1.5px solid transparent;
  cursor: pointer; transition: all .16s cubic-bezier(.2,.8,.2,1); white-space: nowrap; }
.btn:hover { transform: translateY(-1px); }
.btn:active { transform: scale(.98); }
.btn-sm { padding: 7px 14px; font-size: 13px; }
.btn-primary { background: var(--blue); color: #fff; }
.btn-primary:hover { background: var(--galaxie-blue-hover); }
.btn-outline { background: #fff; color: var(--txt); border-color: var(--ink-250); }
.btn-outline:hover { background: var(--ink-100); border-color: var(--ink-300); }
.btn-light { background: rgba(255,255,255,.16); color: #fff; }
.btn-light:hover { background: rgba(255,255,255,.26); }
.iconbtn { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px;
  border: none; background: transparent; border-radius: 8px; cursor: pointer; color: var(--txt-3);
  transition: background .14s, color .14s; }
.iconbtn:hover { background: var(--ink-100); color: var(--txt); }
.iconbtn.ghost { color: inherit; }
.iconbtn.ghost:hover { background: rgba(0,0,0,.06); }
.iconbtn.light { color: rgba(255,255,255,.8); }
.iconbtn.light:hover { background: rgba(255,255,255,.16); color: #fff; }
.linkbtn { display: inline-flex; align-items: center; gap: 5px; background: none; border: none; cursor: pointer;
  color: var(--blue); font-family: var(--font-body); font-weight: 700; font-size: 13px; }
.linkbtn:hover { text-decoration: underline; }
.linkbtn.sm { font-size: 12px; color: var(--txt-2); font-weight: 600; }
.muted { color: var(--txt-3); }
.muted2 { color: var(--txt-2); }

/* ---- TOPBAR ------------------------------------------------------------ */
.topbar { height: var(--topbar-h); flex-shrink: 0; background: var(--surface); border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 18px; padding: 0 18px; }
.brand { display: flex; align-items: center; gap: 11px; flex-shrink: 0; }
.brand-mark { width: 38px; height: 38px; border-radius: 10px; background: var(--ink-abyss); color: #fff;
  display: flex; align-items: center; justify-content: center; }
.brand-title { font-weight: 700; font-size: 15px; letter-spacing: -.01em; line-height: 1.1; }
.brand-sub { font-size: 11px; color: var(--txt-3); font-weight: 500; margin-top: 1px; }
.searchbox { flex: 1; max-width: 560px; display: flex; align-items: center; gap: 9px; height: 38px;
  padding: 0 12px; background: var(--ink-100); border: 1px solid transparent; border-radius: 10px; color: var(--txt-3); }
.searchbox:focus-within { background: #fff; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(44,105,246,.14); color: var(--txt-2); }
.searchbox input { flex: 1; border: none; background: none; outline: none; font-family: var(--font-body);
  font-size: 14px; color: var(--txt); }
.topbar-stats { display: flex; gap: 8px; margin-left: auto; }
.stat-chip { font-size: 12px; color: var(--txt-2); background: var(--ink-100); padding: 6px 11px; border-radius: 9999px; white-space: nowrap; }
.stat-chip b { color: var(--txt); font-weight: 700; }
.stat-chip.ok { background: rgba(11,153,98,.10); color: #0b9962; }
.stat-chip.ok b { color: #0b9962; }

/* ---- SUBBAR (nav + filtres) ------------------------------------------- */
.subbar { flex-shrink: 0; background: var(--surface); border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 16px; padding: 8px 18px; flex-wrap: wrap; }
.vtabs { display: flex; gap: 2px; background: var(--ink-100); padding: 3px; border-radius: 10px; }
.vtab { display: inline-flex; align-items: center; gap: 7px; padding: 7px 13px; border: none; background: none;
  border-radius: 8px; cursor: pointer; font-family: var(--font-body); font-weight: 600; font-size: 13px;
  color: var(--txt-2); transition: all .14s; }
.vtab:hover { color: var(--txt); }
.vtab.active { background: #fff; color: var(--blue); box-shadow: var(--shadow-s); }
.filters { display: flex; align-items: center; gap: 8px; margin-left: auto; flex-wrap: wrap; }
.fsel { position: relative; display: inline-flex; align-items: center; }
.fsel select { appearance: none; -webkit-appearance: none; padding: 7px 28px 7px 11px; border: 1px solid var(--line);
  background: #fff; border-radius: 8px; font-family: var(--font-body); font-size: 13px; color: var(--txt);
  cursor: pointer; outline: none; transition: border .14s; }
.fsel select:hover { border-color: var(--ink-300); }
.fsel select:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(44,105,246,.14); }
.fsel > svg { position: absolute; right: 9px; pointer-events: none; color: var(--txt-3); }
.fsel.dark select { background: rgba(255,255,255,.12); border-color: rgba(255,255,255,.2); color: #fff; }
.fsel.dark select option { color: #14181d; }
.fsel.dark > svg { color: rgba(255,255,255,.7); }
.chiptgl { display: inline-flex; align-items: center; gap: 6px; padding: 7px 13px; border: 1px solid var(--line);
  background: #fff; border-radius: 9999px; cursor: pointer; font-family: var(--font-body); font-weight: 600;
  font-size: 13px; color: var(--txt-2); transition: all .14s; }
.chiptgl:hover { border-color: var(--ink-300); }
.chiptgl.on { background: rgba(255,165,31,.12); border-color: #ffc300; color: #b07a00; }
.rescount { font-size: 12px; color: var(--txt-3); white-space: nowrap; margin-left: 4px; }

/* ---- CONTENU ----------------------------------------------------------- */
.content { flex: 1; min-height: 0; display: flex; }
.content > * { flex: 1; min-height: 0; min-width: 0; }

/* =============================================================================
   DASHBOARD
   ========================================================================= */
.dash { overflow-y: auto; padding: 22px 24px 60px; }
.kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 16px; }
.kpi { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; }
.kpi-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.kpi-icon { display: inline-flex; }
.kpi-label { font-size: 12px; color: var(--txt-2); font-weight: 600; }
.kpi-val { font-size: 32px; font-weight: 800; line-height: 1; letter-spacing: -.02em; font-family: var(--font-brand); }
.kpi-sub { font-size: 11.5px; color: var(--txt-3); margin-top: 7px; }

.dash-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.panel { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; }
.panel-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.panel-head h3 { font-size: 14px; font-weight: 700; letter-spacing: -.01em; }

.funnel { display: flex; align-items: flex-end; gap: 10px; height: 165px; padding-top: 10px; }
.funnel-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 6px; cursor: pointer; }
.funnel-bar { width: 100%; border-radius: 8px 8px 4px 4px; transition: opacity .15s; min-height: 8px; }
.funnel-col:hover .funnel-bar { opacity: .82; }
.funnel-val { font-weight: 800; font-size: 17px; }
.funnel-lab { font-size: 11px; color: var(--txt-2); text-align: center; line-height: 1.2; }

.barrow { display: flex; align-items: center; gap: 10px; padding: 5px 0; }
.barrow.clickable { cursor: pointer; border-radius: 6px; }
.barrow.clickable:hover { background: var(--ink-100); margin: 0 -6px; padding: 5px 6px; }
.barrow-l { width: 92px; font-size: 12px; color: var(--txt-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
.barrow-track { flex: 1; height: 8px; background: var(--ink-100); border-radius: 9999px; overflow: hidden; }
.barrow-fill { height: 100%; border-radius: 9999px; transition: width .3s; }
.barrow-v { width: 30px; text-align: right; font-size: 12px; font-weight: 700; color: var(--txt); flex-shrink: 0; }
.donut-wrap { display: flex; gap: 16px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line-soft); }
.donut-leg { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--txt-2); font-weight: 600; }
.donut-leg span { width: 10px; height: 10px; border-radius: 3px; }

.hist { display: flex; align-items: flex-end; gap: 12px; height: 150px; padding: 4px 6px 0; }
.hist-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 6px; }
.hist-val { font-size: 13px; font-weight: 700; color: var(--txt-2); }
.hist-bar { width: 100%; max-width: 46px; border-radius: 6px 6px 3px 3px; }
.hist-lab { font-size: 11px; color: var(--txt-3); font-weight: 600; }

.short-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.short-card { display: flex; align-items: center; gap: 11px; padding: 11px; border: 1px solid var(--line); border-radius: 12px; cursor: pointer; transition: all .14s; }
.short-card:hover { border-color: var(--ink-300); box-shadow: var(--shadow-s); transform: translateY(-1px); }
.short-name { font-weight: 700; font-size: 13.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.short-sub { font-size: 11.5px; color: var(--txt-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 1px 0 5px; }
.short-badges { display: flex; gap: 5px; flex-wrap: wrap; }

/* =============================================================================
   LISTE (master-détail)
   ========================================================================= */
.liste { display: flex; overflow: hidden; }
.liste-list { width: 366px; flex-shrink: 0; border-right: 1px solid var(--line); overflow-y: auto; background: var(--surface); }
.liste-detail { flex: 1; min-width: 0; overflow: hidden; background: var(--bg); display: flex; }

.prow { display: flex; align-items: center; gap: 11px; padding: 11px 14px; border-bottom: 1px solid var(--line-soft);
  cursor: pointer; transition: background .12s; border-left: 3px solid transparent; }
.prow:hover { background: var(--ink-100); }
.prow.active { background: rgba(44,105,246,.07); border-left-color: var(--tc); }
.prow-info { flex: 1; min-width: 0; }
.prow-name { font-weight: 700; font-size: 13.5px; display: flex; align-items: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.prow-sub { font-size: 11.5px; color: var(--txt-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 2px 0 5px; }
.prow-badges { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.prow-mail { display: inline-flex; color: #2c69f6; background: rgba(44,105,246,.10); border-radius: 4px; padding: 2px 4px; }

/* =============================================================================
   DÉTAIL (drawer + master-détail)
   ========================================================================= */
.detailpane { display: flex; flex-direction: column; height: 100%; width: 100%; background: var(--bg); }
.dt-head { position: relative; flex-shrink: 0; background: var(--surface); border-bottom: 1px solid var(--line);
  padding: 18px 20px 14px; }
.dt-head::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--tc); }
.dt-nav { position: absolute; top: 12px; right: 50px; display: flex; gap: 2px; }
.dt-close { position: absolute; top: 12px; right: 12px; }
.dt-head-row { display: flex; align-items: center; gap: 13px; margin-bottom: 13px; padding-right: 40px; }
.dt-name { font-size: 19px; font-weight: 800; letter-spacing: -.02em; line-height: 1.15; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dt-sub { display: flex; gap: 14px; flex-wrap: wrap; font-size: 12.5px; color: var(--txt-2); margin-top: 3px; }

}

</style>
<div id="auth-wall">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/><path d="M12 3v4M12 17v4M3 12h4M17 12h4"/><circle cx="12" cy="12" r="3"/>
      </svg>

    <input class="auth-input" type="password" id="pwd-input" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')checkAuth()">
    <button class="auth-btn" onclick="checkAuth()">Accéder →</button>
    <div class="auth-error" id="auth-err"></div>
  </div>
</div>
<script>
const HASH = 'f098a27e956f2d8ae1d07cac7f618277d6f8bb322a6d5eb0c98904ed97617c39';
async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function checkAuth() {
  const val = document.getElementById('pwd-input').value;
  const h = await sha256(val);
  if (h === HASH) {
    sessionStorage.setItem('cdt_auth', '1');
    document.getElementById('auth-wall').remove();
  } else {
    document.getElementById('auth-err').textContent = 'Mot de passe incorrect';
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-input').focus();
  }
}
// Auto-check si déjà authentifié
if (sessionStorage.getItem('cdt_auth') === '1') {
  document.addEventListener('DOMContentLoaded', () => {
    const wall = document.getElementById('auth-wall');
    if (wall) wall.remove();
  });
}
</script>

<script type="text/babel">
/* =============================================================================
   store.jsx — état persistant + helpers métier
   ========================================================================= */
const { useState, useEffect, useCallback, useMemo, useRef } = React;

/* ---- identité stable d'un profil (certains n'ont pas d'url) ------------- */
function idOf(p) {
  return p.url && p.url.trim() ? p.url : `n:${p.nom}|${p.source}|${p.entreprise || ''}`;
}

/* ---- helpers d'affichage ----------------------------------------------- */
function initials(n) {
  return (n || '').split(' ').filter(Boolean).map(w => w[0]).join('').slice(0, 2).toUpperCase() || '?';
}
function srcShort(s) { return (s || '').replace(' (public)', ''); }
function fmtLoc(l) {
  if (!l) return '';
  return l.replace(/,?\s*(France|FR)$/i, '').trim();
}

/* ---- couleurs techno --------------------------------------------------- */
const TECH_COLOR = { Java: '#2c69f6', COBOL: '#fa794e' };
const TECH_SOFT  = { Java: 'rgba(44,105,246,.10)', COBOL: 'rgba(250,121,78,.12)' };
function techColor(t) { return TECH_COLOR[t] || '#636466'; }
function techSoft(t) { return TECH_SOFT[t] || 'rgba(99,100,102,.1)'; }

/* ---- score ------------------------------------------------------------- */
const SCORE_MAX = 15;
function scoreColor(s) {
  if (s >= 7) return '#0b9962';      // success
  if (s >= 5) return '#2c69f6';      // blue
  if (s >= 3) return '#ffa51f';      // amber
  if (s >= 1) return '#fa794e';      // orange
  return '#b5b5b5';                  // neutral
}
function scoreLabel(s) {
  if (s >= 7) return 'Priorité haute';
  if (s >= 5) return 'À étudier';
  if (s >= 3) return 'Potentiel';
  if (s >= 1) return 'Faible signal';
  return 'À qualifier';
}

/* signaux qui composent le score — reconstruits depuis les données dispo */
function scoreSignals(p) {
  const bio = (p.bio || '');
  const senior = /\b(lead|senior|sénior|principal|staff|architect|architecte|expert|head|cto|tech ?lead|confirmé|10\+|15 ans|20 ans)\b/i.test(bio);
  const stack = /\b(java|spring|quarkus|jakarta|jvm|kotlin|cobol|mainframe|jcl|cics|db2|z\/os|micronaut|hibernate|microservice)\b/i.test(bio);
  const precise = !!p.loc && !/^hauts-de-france$/i.test(p.loc.trim());
  const intent = /malt|talent\.io|cooptalis|freelance|codeur|indeed|apec|cv/i.test(p.source || '');
  return [
    { key: 'dispo',  label: 'Disponibilité confirmée', on: p.dispo === 'Disponible', w: 3 },
    { key: 'email',  label: 'Email public trouvé',      on: !!p.email,               w: 3 },
    { key: 'senior', label: 'Séniorité détectée',        on: senior,                  w: 2 },
    { key: 'stack',  label: 'Stack pertinent',           on: stack,                   w: 2 },
    { key: 'loc',    label: 'Localisation précise',      on: precise,                 w: 2 },
    { key: 'intent', label: 'Canal à forte intention',   on: intent,                  w: 3 },
  ];
}

/* ---- statuts pipeline -------------------------------------------------- */
const STATUSES = ['À contacter', 'Contacté', 'En attente', 'Retenu', 'Écarté'];
const STATUS_META = {
  'À contacter': { c: '#636466', soft: '#eef0f3', dot: '#8c8e97' },
  'Contacté':    { c: '#2c69f6', soft: 'rgba(44,105,246,.10)', dot: '#2c69f6' },
  'En attente':  { c: '#ffa51f', soft: 'rgba(255,165,31,.14)', dot: '#ffa51f' },
  'Retenu':      { c: '#0b9962', soft: 'rgba(11,153,98,.12)', dot: '#0b9962' },
  'Écarté':      { c: '#d0021b', soft: 'rgba(208,2,27,.08)', dot: '#d0021b' },
};
function statusMeta(s) { return STATUS_META[s] || STATUS_META['À contacter']; }

/* =============================================================================
   useStore — persistance localStorage (statut, notes, favoris, emails édités)
   ========================================================================= */
const LS_KEY = 'cdt_state_v2';
function loadState() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; }
  catch (e) { return {}; }
}
function useStore() {
  const [state, setState] = useState(() => {
    const s = loadState();
    return { status: s.status || {}, notes: s.notes || {}, fav: s.fav || {}, emails: s.emails || {} };
  });
  useEffect(() => {
    try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) {}
  }, [state]);

  const setStatus = useCallback((id, v) => setState(s => ({ ...s, status: { ...s.status, [id]: v } })), []);
  const setNote   = useCallback((id, v) => setState(s => ({ ...s, notes: { ...s.notes, [id]: v } })), []);
  const toggleFav = useCallback((id) => setState(s => {
    const fav = { ...s.fav }; if (fav[id]) delete fav[id]; else fav[id] = true; return { ...s, fav };
  }), []);
  const setEmail  = useCallback((id, v) => setState(s => ({ ...s, emails: { ...s.emails, [id]: v } })), []);
  const resetAll  = useCallback(() => setState({ status: {}, notes: {}, fav: {}, emails: {} }), []);

  return { state, setStatus, setNote, toggleFav, setEmail, resetAll };
}

/* status par défaut d'un profil */
function statusOf(state, p) { return state.status[idOf(p)] || 'À contacter'; }

/* ---- export CSV -------------------------------------------------------- */
function csvCell(v) {
  v = (v == null ? '' : String(v)).replace(/"/g, '""');
  return `"${v}"`;
}
function exportCSV(profiles, state) {
  const head = ['Nom', 'Tech', 'Score', 'Disponibilité', 'Localisation', 'Entreprise', 'Source', 'Email', 'Statut', 'Favori', 'Notes', 'URL'];
  const rows = profiles.map(p => {
    const id = idOf(p);
    return [
      p.nom, p.tech, p.score, p.dispo, p.loc, p.entreprise, srcShort(p.source),
      p.email, statusOf(state, p), state.fav[id] ? 'Oui' : '', state.notes[id] || '', p.url,
    ].map(csvCell).join(',');
  });
  const csv = '\uFEFF' + [head.map(csvCell).join(','), ...rows].join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `chasseur-de-tetes-${new Date().toISOString().slice(0, 10)}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

Object.assign(window, {
  idOf, initials, srcShort, fmtLoc, techColor, techSoft, TECH_COLOR,
  SCORE_MAX, scoreColor, scoreLabel, scoreSignals,
  STATUSES, STATUS_META, statusMeta, useStore, statusOf, exportCSV,
});

</script>

/* ---- Avatar ------------------------------------------------------------ */
function Avatar({ p, size = 38, ring }) {

/* ---- Badge tech -------------------------------------------------------- */
function TechBadge({ tech, small }) {
  const c = techColor(tech);
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 5,
      padding: small ? '2px 8px' : '3px 10px', borderRadius: 4,

/* ---- Badge dispo ------------------------------------------------------- */
function DispoBadge({ dispo, small }) {
  const ok = dispo === 'Disponible';
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 5,
      padding: small ? '2px 8px' : '3px 10px', borderRadius: 4, fontWeight: 600,

      {ok ? 'Disponible' : 'Dispo. inconnue'}
    </span>
  );
}

/* ---- Chip score -------------------------------------------------------- */
function ScoreChip({ score, size = 'm' }) {
  const c = scoreColor(score);
  const dims = size === 'l' ? { w: 46, h: 46, f: 19, s: 9 } : size === 's' ? { w: 26, h: 26, f: 12, s: 7 } : { w: 34, h: 34, f: 15, s: 8 };
  return (
    <div title={`Score ${score}/${SCORE_MAX} · ${scoreLabel(score)}`} style={{
      width: dims.w, height: dims.h, borderRadius: 9, flexShrink: 0,
      display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
      background: c, color: '#fff', fontWeight: 800, fontSize: dims.f, lineHeight: 1,
    }}>{score}</div>
  );
}

/* ---- Pastille statut --------------------------------------------------- */
function StatusPill({ status, small }) {
  const m = statusMeta(status);
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      padding: small ? '2px 9px' : '4px 11px', borderRadius: 9999,
      fontWeight: 600, fontSize: small ? 11 : 12, color: m.c, background: m.soft,
    }}>
      <span style={{ width: 6, height: 6, borderRadius: '50%', background: m.dot }} />{status}
    </span>
  );
}

/* ---- Bouton favori ----------------------------------------------------- */
function StarBtn({ active, onClick, size = 18 }) {
  return (
    <button onClick={(e) => { e.stopPropagation(); onClick(); }} className="iconbtn"
      title={active ? 'Retirer des favoris' : 'Ajouter aux favoris'}
      style={{ color: active ? '#ffa51f' : '#c2c5cc' }}>
      <Icon name="star" size={size} fill={active ? '#ffc300' : 'none'} stroke={active ? 0 : 1.6} />
    </button>
  );
}

/* ---- Sélecteur de statut ---------------------------------------------- */
function StatusSelect({ value, onChange }) {
  const m = statusMeta(value);
  return (
    <div className="statwrap" style={{ borderColor: m.c }}>
      <span style={{ width: 7, height: 7, borderRadius: '50%', background: m.dot }} />
      <select value={value} onChange={(e) => onChange(e.target.value)} style={{ color: m.c }}>
        {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
      </select>
      <Icon name="chevDown" size={14} />
    </div>
  );
}

/* ---- barre de signaux du score ---------------------------------------- */
function ScoreBreakdown({ p }) {
  const sigs = scoreSignals(p);
  return (
    <div className="sigwrap">
      {sigs.map(s => (
        <div key={s.key} className={'sigrow' + (s.on ? ' on' : '')}>
          <span className="sigdot">
            <Icon name={s.on ? 'check' : 'x'} size={12} stroke={2.4} />
          </span>
          <span className="siglabel">{s.label}</span>
        </div>
      ))}
    </div>
  );
}

});

            <Field icon="source" label="Source">{srcShort(p.source)}</Field>

<script type="text/babel">
/* =============================================================================
   dashboard.jsx — vue d'ensemble / statistiques
   ========================================================================= */
function KPI({ label, value, sub, accent, icon }) {
  return (
    <div className="kpi">
      <div className="kpi-top">
        <span className="kpi-icon" style={{ color: accent }}><Icon name={icon} size={18} /></span>
        <span className="kpi-label">{label}</span>
      </div>
      <div className="kpi-val" style={{ color: accent }}>{value}</div>
      {sub && <div className="kpi-sub">{sub}</div>}
    </div>
  );
}

function BarRow({ label, value, max, color, onClick, suffix }) {
  const pct = max ? Math.max(2, (value / max) * 100) : 0;
  return (
    <div className={'barrow' + (onClick ? ' clickable' : '')} onClick={onClick}>
      <div className="barrow-l" title={label}>{label}</div>
      <div className="barrow-track"><div className="barrow-fill" style={{ width: pct + '%', background: color }} /></div>
      <div className="barrow-v">{value}{suffix || ''}</div>
    </div>
  );
}

function Panel({ title, action, children, span }) {
  return (
    <div className="panel" style={span ? { gridColumn: `span ${span}` } : null}>
      <div className="panel-head">
        <h3>{title}</h3>
        {action}
      </div>
      {children}
    </div>
  );
}

function Dashboard({ profiles, store, onOpen, onJump }) {
  const st = store.state;
  const total = profiles.length;
  const dispo = profiles.filter(p => p.dispo === 'Disponible').length;
  const withEmail = profiles.filter(p => p.email).length;
  const favs = profiles.filter(p => st.fav[idOf(p)]).length;
  const inPipe = profiles.filter(p => statusOf(st, p) !== 'À contacter').length;
  const hot = profiles.filter(p => p.score >= 5).length;

  // par techno
  const byTech = ['Java', 'COBOL'].map(t => ({ label: t, value: profiles.filter(p => p.tech === t).length, color: techColor(t) }));
  // pipeline
  const byStatus = STATUSES.map(s => ({ label: s, value: profiles.filter(p => statusOf(st, p) === s).length, color: statusMeta(s).c }));
  const maxStatus = Math.max(...byStatus.map(s => s.value), 1);
  // sources
  const srcMap = {};
  profiles.forEach(p => { const s = srcShort(p.source); srcMap[s] = (srcMap[s] || 0) + 1; });
  const sources = Object.entries(srcMap).sort((a, b) => b[1] - a[1]).slice(0, 8).map(([label, value]) => ({ label, value }));
  const maxSrc = Math.max(...sources.map(s => s.value), 1);
  // villes
  const cityMap = {};
  profiles.forEach(p => { const c = fmtLoc(p.loc) || 'Non précisé'; cityMap[c] = (cityMap[c] || 0) + 1; });
  const cities = Object.entries(cityMap).sort((a, b) => b[1] - a[1]).slice(0, 8).map(([label, value]) => ({ label, value }));
  const maxCity = Math.max(...cities.map(s => s.value), 1);
  // scores histogram (buckets)
  const buckets = [{ k: '0', lo: 0, hi: 0 }, { k: '1–2', lo: 1, hi: 2 }, { k: '3–4', lo: 3, hi: 4 }, { k: '5–6', lo: 5, hi: 6 }, { k: '7+', lo: 7, hi: 99 }];
  const hist = buckets.map(b => ({ label: b.k, value: profiles.filter(p => p.score >= b.lo && p.score <= b.hi).length, color: scoreColor(b.lo) }));
  const maxHist = Math.max(...hist.map(h => h.value), 1);

  // shortlist prioritaire (score puis dispo puis email)
  const shortlist = [...profiles].sort((a, b) =>
    b.score - a.score || (b.dispo === 'Disponible') - (a.dispo === 'Disponible') || (!!b.email - !!a.email)
  ).slice(0, 6);

  return (
    <div className="dash">
      <div className="kpi-row">
        <KPI label="Profils sourcés" value={total} accent="#0e1114" icon="user" sub={`${byTech[0].value} Java · ${byTech[1].value} COBOL`} />
        <KPI label="Disponibles" value={dispo} accent="#0b9962" icon="check" sub={`${Math.round(dispo / total * 100)}% du vivier`} />
        <KPI label="Emails trouvés" value={withEmail} accent="#2c69f6" icon="mail" sub={`${Math.round(withEmail / total * 100)}% contactables`} />
        <KPI label="Priorité (score ≥ 5)" value={hot} accent="#fa794e" icon="flame" sub="à traiter en premier" />
        <KPI label="Dans le pipeline" value={inPipe} accent="#b748ab" icon="kanban" sub={`${favs} favoris`} />
      </div>

      <div className="dash-grid">
        <Panel title="Pipeline" span={2} action={<button className="linkbtn" onClick={() => onJump('pipeline')}>Ouvrir le kanban <Icon name="arrowRight" size={14} /></button>}>
          <div className="funnel">
            {byStatus.map(s => (
              <div key={s.label} className="funnel-col" onClick={() => onJump('pipeline')}>
                <div className="funnel-bar" style={{ height: 8 + (s.value / maxStatus) * 110, background: s.color }} />
                <div className="funnel-val">{s.value}</div>
                <div className="funnel-lab">{s.label}</div>
              </div>
            ))}
          </div>
        </Panel>

        <Panel title="Répartition par techno">
          {byTech.map(t => <BarRow key={t.label} {...t} max={total} />)}
          <div className="donut-wrap">
            {byTech.map((t, i) => {
              const pct = Math.round(t.value / total * 100);
              return <div key={t.label} className="donut-leg"><span style={{ background: t.color }} />{t.label} · {pct}%</div>;
            })}
          </div>
        </Panel>

        <Panel title="Distribution des scores">
          <div className="hist">
            {hist.map(h => (
              <div key={h.label} className="hist-col">
                <div className="hist-val">{h.value}</div>
                <div className="hist-bar" style={{ height: 10 + (h.value / maxHist) * 90, background: h.color }} />
                <div className="hist-lab">{h.label}</div>
              </div>
            ))}
          </div>
        </Panel>

        <Panel title="Top sources">
          {sources.map(s => <BarRow key={s.label} {...s} max={maxSrc} color="#2c69f6" onClick={() => onJump('table', { source: s.label })} />)}
        </Panel>

        <Panel title="Top localisations">
          {cities.map(c => <BarRow key={c.label} {...c} max={maxCity} color="#007a97" onClick={() => onJump('table', { q: c.label })} />)}
        </Panel>

        <Panel title="Profils prioritaires" span={3} action={<button className="linkbtn" onClick={() => onJump('table')}>Tout voir <Icon name="arrowRight" size={14} /></button>}>
          <div className="short-grid">
            {shortlist.map(p => (
              <div key={idOf(p)} className="short-card" onClick={() => onOpen(p)}>
                <Avatar p={p} size={40} />
                <div style={{ minWidth: 0, flex: 1 }}>
                  <div className="short-name">{p.nom}</div>
                  <div className="short-sub">{fmtLoc(p.loc) || srcShort(p.source)}</div>
                  <div className="short-badges">
                    <TechBadge tech={p.tech} small />
                    {p.dispo === 'Disponible' && <DispoBadge dispo={p.dispo} small />}
                  </div>
                </div>
                <ScoreChip score={p.score} size="s" />
              </div>
            ))}
          </div>
        </Panel>
      </div>
    </div>
  );
}

Object.assign(window, { Dashboard });

</script>
<script type="text/babel">
/* =============================================================================
   views.jsx — Liste (master-détail), Tableau, Cartes
   ========================================================================= */

/* ---- Élément de liste réutilisable ------------------------------------ */
function ProfileRow({ p, active, onClick, store }) {
  const id = idOf(p);
  const fav = !!store.state.fav[id];
  const status = statusOf(store.state, p);
  return (
    <div className={'prow' + (active ? ' active' : '')} onClick={onClick} style={{ '--tc': techColor(p.tech) }}>
      <Avatar p={p} size={38} />
      <div className="prow-info">
        <div className="prow-name">{p.nom} {fav && <Icon name="star" size={12} fill="#ffc300" stroke={0} style={{ marginLeft: 2 }} />}</div>
        <div className="prow-sub">{fmtLoc(p.loc) || p.entreprise || srcShort(p.source)}</div>
        <div className="prow-badges">
          <TechBadge tech={p.tech} small />
          {p.dispo === 'Disponible' && <DispoBadge dispo={p.dispo} small />}
          {p.email && <span className="prow-mail"><Icon name="mail" size={11} /></span>}
          {status !== 'À contacter' && <StatusPill status={status} small />}
        </div>
      </div>
      <ScoreChip score={p.score} size="s" />
    </div>
  );
}

/* ---- Vue LISTE (master-détail) ---------------------------------------- */
function ListeView({ profiles, store }) {
  const [sel, setSel] = useState(0);
  useEffect(() => { setSel(0); }, [profiles]);
  const p = profiles[sel];
  const nav = (d) => setSel(i => Math.min(profiles.length - 1, Math.max(0, i + d)));

  useEffect(() => {
    const h = (e) => {
      if (e.target.matches('input,textarea,select')) return;
      if (e.key === 'ArrowDown') { e.preventDefault(); nav(1); }
      if (e.key === 'ArrowUp') { e.preventDefault(); nav(-1); }
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [profiles.length]);

  if (!profiles.length) return <Empty />;
  return (
    <div className="liste">
      <div className="liste-list">
        {profiles.map((pr, i) => (
          <ProfileRow key={idOf(pr)} p={pr} active={i === sel} onClick={() => setSel(i)} store={store} />
        ))}
      </div>
      <div className="liste-detail">
        {p ? <ProfileDetail p={p} store={store} onNav={nav} /> : <Empty />}
      </div>
    </div>
  );
}

/* ---- Vue CARTES -------------------------------------------------------- */
function CartesView({ profiles, store, onOpen }) {
  if (!profiles.length) return <Empty />;
  return (
    <div className="cartes">
      {profiles.map(p => {
        const id = idOf(p);
        const fav = !!store.state.fav[id];
        const status = statusOf(store.state, p);
        return (
          <div key={id} className="pcard" onClick={() => onOpen(p)} style={{ '--tc': techColor(p.tech) }}>
            <div className="pcard-top">
              <Avatar p={p} size={44} ring />
              <ScoreChip score={p.score} />
            </div>
            <div className="pcard-name">{p.nom}</div>
            <div className="pcard-sub">
              {p.entreprise && <span><Icon name="building" size={12} /> {p.entreprise}</span>}
              {p.loc && <span><Icon name="pin" size={12} /> {fmtLoc(p.loc)}</span>}
            </div>
            {p.bio && <div className="pcard-bio">{p.bio}</div>}
            <div className="pcard-foot">
              <div className="pcard-badges">
                <TechBadge tech={p.tech} small />
                {p.dispo === 'Disponible' && <DispoBadge dispo={p.dispo} small />}
              </div>
              <StarBtn active={fav} onClick={() => store.toggleFav(id)} />
            </div>
            <div className="pcard-status"><StatusPill status={status} small /></div>
          </div>
        );
      })}
    </div>
  );
}

/* ---- Vue TABLEAU ------------------------------------------------------- */
const TABLE_COLS = [
  { key: 'nom', label: 'Nom', get: p => p.nom },
  { key: 'tech', label: 'Tech', get: p => p.tech },
  { key: 'score', label: 'Score', get: p => p.score, num: true },
  { key: 'dispo', label: 'Dispo.', get: p => (p.dispo === 'Disponible' ? 1 : 0), num: true },
  { key: 'loc', label: 'Localisation', get: p => fmtLoc(p.loc) },
  { key: 'entreprise', label: 'Entreprise', get: p => p.entreprise || '' },
  { key: 'source', label: 'Source', get: p => srcShort(p.source) },
];

function TableView({ profiles, store, onOpen, selected, setSelected }) {
  const [sort, setSort] = useState({ key: 'score', dir: -1 });
  const sorted = useMemo(() => {
    const col = TABLE_COLS.find(c => c.key === sort.key) || TABLE_COLS[2];
    const arr = [...profiles].sort((a, b) => {
      let va = col.get(a), vb = col.get(b);
      if (col.num) return (va - vb) * sort.dir;
      return String(va).localeCompare(String(vb), 'fr') * sort.dir;
    });
    return arr;
  }, [profiles, sort]);

  const toggleSort = (k) => setSort(s => s.key === k ? { key: k, dir: -s.dir } : { key: k, dir: k === 'nom' || k === 'loc' ? 1 : -1 });
  const allIds = sorted.map(idOf);
  const allSel = allIds.length > 0 && allIds.every(id => selected.has(id));
  const toggleAll = () => setSelected(prev => {
    const n = new Set(prev);
    if (allSel) allIds.forEach(id => n.delete(id)); else allIds.forEach(id => n.add(id));
    return n;
  });
  const toggleOne = (id) => setSelected(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });

  if (!profiles.length) return <Empty />;

  return (
    <div className="tablewrap">
      <table className="ptable">
        <thead>
          <tr>
            <th className="tc-check"><input type="checkbox" checked={allSel} onChange={toggleAll} /></th>
            <th className="tc-star"></th>
            {TABLE_COLS.map(c => (
              <th key={c.key} className={'sortable' + (c.num ? ' num' : '')} onClick={() => toggleSort(c.key)}>
                <span>{c.label}</span>
                {sort.key === c.key
                  ? <Icon name="chevDown" size={13} style={{ transform: sort.dir === 1 ? 'rotate(180deg)' : 'none', opacity: .9 }} />
                  : <Icon name="sort" size={13} style={{ opacity: .25 }} />}
              </th>
            ))}
            <th>Statut</th>
          </tr>
        </thead>
        <tbody>
          {sorted.map(p => {
            const id = idOf(p);
            const isSel = selected.has(id);
            const fav = !!store.state.fav[id];
            return (
              <tr key={id} className={isSel ? 'rowsel' : ''} onClick={() => onOpen(p)}>
                <td className="tc-check" onClick={e => e.stopPropagation()}><input type="checkbox" checked={isSel} onChange={() => toggleOne(id)} /></td>
                <td className="tc-star"><StarBtn active={fav} onClick={() => store.toggleFav(id)} size={16} /></td>
                <td className="tc-name">
                  <div className="tname">
                    <Avatar p={p} size={28} />
                    <span className="tname-t">{p.nom}</span>
                  </div>
                </td>
                <td><TechBadge tech={p.tech} small /></td>
                <td className="num"><span className="tscore" style={{ color: scoreColor(p.score) }}>{p.score}</span></td>
                <td className="num">{p.dispo === 'Disponible' ? <span className="tdispo">●</span> : <span className="tdispo-no">–</span>}</td>
                <td className="muted2">{fmtLoc(p.loc) || '—'}</td>
                <td className="muted2">{p.entreprise || '—'}</td>
                <td className="muted2">{srcShort(p.source)}</td>
                <td onClick={e => e.stopPropagation()}><StatusSelect value={statusOf(store.state, p)} onChange={v => store.setStatus(id, v)} /></td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

/* ---- Empty state ------------------------------------------------------- */
function Empty({ msg }) {
  return (
    <div className="emptyv">
      <div className="emptyv-ic"><Icon name="search" size={30} /></div>
      <p>{msg || 'Aucun profil ne correspond à vos filtres'}</p>
    </div>
  );
}

Object.assign(window, { ListeView, CartesView, TableView, ProfileRow, Empty });

</script>
<script type="text/babel">
/* =============================================================================
   pipeline.jsx — vue kanban par statut (drag & drop)
   ========================================================================= */
function KanbanCard({ p, store, onOpen, onDragStart }) {
  const id = idOf(p);
  const fav = !!store.state.fav[id];
  return (
    <div className="kcard" draggable onDragStart={(e) => onDragStart(e, id)} onClick={() => onOpen(p)}
      style={{ '--tc': techColor(p.tech) }}>
      <div className="kcard-top">
        <Avatar p={p} size={32} />
        <div style={{ minWidth: 0, flex: 1 }}>
          <div className="kcard-name">{p.nom}</div>
          <div className="kcard-sub">{fmtLoc(p.loc) || srcShort(p.source)}</div>
        </div>
        <ScoreChip score={p.score} size="s" />
      </div>
      <div className="kcard-foot">
        <TechBadge tech={p.tech} small />
        {p.dispo === 'Disponible' && <DispoBadge dispo={p.dispo} small />}
        {p.email && <span className="prow-mail"><Icon name="mail" size={11} /></span>}
        <span style={{ flex: 1 }} />
        {fav && <Icon name="star" size={13} fill="#ffc300" stroke={0} />}
      </div>
    </div>
  );
}

function PipelineView({ profiles, store, onOpen }) {
  const [over, setOver] = useState(null);
  const dragId = useRef(null);

  const groups = useMemo(() => {
    const g = {}; STATUSES.forEach(s => g[s] = []);
    profiles.forEach(p => { g[statusOf(store.state, p)].push(p); });
    STATUSES.forEach(s => g[s].sort((a, b) => b.score - a.score));
    return g;
  }, [profiles, store.state]);

  const onDragStart = (e, id) => { dragId.current = id; e.dataTransfer.effectAllowed = 'move'; };
  const onDrop = (status) => { if (dragId.current) { store.setStatus(dragId.current, status); dragId.current = null; } setOver(null); };

  return (
    <div className="kanban">
      {STATUSES.map(s => {
        const m = statusMeta(s);
        const list = groups[s];
        return (
          <div key={s} className={'kcol' + (over === s ? ' over' : '')}
            onDragOver={(e) => { e.preventDefault(); setOver(s); }}
            onDragLeave={() => setOver(o => o === s ? null : o)}
            onDrop={() => onDrop(s)}>
            <div className="kcol-head" style={{ '--sc': m.c }}>
              <span className="kcol-dot" style={{ background: m.dot }} />
              <span className="kcol-title">{s}</span>
              <span className="kcol-count">{list.length}</span>
            </div>
            <div className="kcol-body">
              {list.map(p => <KanbanCard key={idOf(p)} p={p} store={store} onOpen={onOpen} onDragStart={onDragStart} />)}
              {!list.length && <div className="kcol-empty">Déposez un profil ici</div>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

Object.assign(window, { PipelineView });

</script>
<script type="text/babel">
/* =============================================================================
   app.jsx — shell : topbar, filtres, routing des vues, drawer, sélection
   ========================================================================= */
const ALL = window.PROFILES || [];

const VIEWS = [
  { key: 'dashboard', label: "Vue d'ensemble", icon: 'dashboard' },
  { key: 'liste', label: 'Liste', icon: 'list' },
  { key: 'table', label: 'Tableau', icon: 'table' },
  { key: 'pipeline', label: 'Pipeline', icon: 'kanban' },
  { key: 'cartes', label: 'Cartes', icon: 'grid' },
];

const SOURCES = Array.from(new Set(ALL.map(p => srcShort(p.source)))).sort();
const SCORE_OPTS = [{ v: 0, l: 'Tous scores' }, { v: 3, l: 'Score ≥ 3' }, { v: 5, l: 'Score ≥ 5' }, { v: 7, l: 'Score ≥ 7' }];

function Toast({ msg }) {
  return <div className={'toast' + (msg ? ' show' : '')}>{msg && <Icon name="check" size={15} stroke={2.4} />}{msg}</div>;
}

/* ---- Drawer (détail latéral) ------------------------------------------ */
function Drawer({ p, store, onClose, onNav }) {
  useEffect(() => {
    const h = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [onClose]);
  return (
    <div className={'drawer-scrim' + (p ? ' open' : '')} onClick={onClose}>
      <div className="drawer" onClick={e => e.stopPropagation()}>
        {p && <ProfileDetail p={p} store={store} onClose={onClose} onNav={onNav} />}
      </div>
    </div>
  );
}

function App() {
  const store = useStore();
  const [view, setView] = useState('dashboard');
  const [q, setQ] = useState('');
  const [tech, setTech] = useState('');
  const [dispo, setDispo] = useState('');
  const [source, setSource] = useState('');
  const [status, setStatus] = useState('');
  const [scoreMin, setScoreMin] = useState(0);
  const [favOnly, setFavOnly] = useState(false);
  const [drawerId, setDrawerId] = useState(null);
  const [selected, setSelected] = useState(new Set());
  const [toastMsg, setToastMsg] = useState('');

  useEffect(() => { window.__toast = (m) => { setToastMsg(m); setTimeout(() => setToastMsg(''), 2200); }; }, []);

  const filtered = useMemo(() => {
    const qq = q.trim().toLowerCase();
    return ALL.filter(p => {
      if (tech && p.tech !== tech) return false;
      if (dispo && p.dispo !== dispo) return false;
      if (source && srcShort(p.source) !== source) return false;
      if (status && statusOf(store.state, p) !== status) return false;
      if (favOnly && !store.state.fav[idOf(p)]) return false;
      if (scoreMin && p.score < scoreMin) return false;
      if (qq && !(`${p.nom} ${p.email} ${p.loc} ${p.entreprise} ${p.bio} ${p.source}`.toLowerCase().includes(qq))) return false;
      return true;
    });
  }, [q, tech, dispo, source, status, scoreMin, favOnly, store.state]);

  const sortedFiltered = useMemo(() => [...filtered].sort((a, b) => b.score - a.score), [filtered]);

  const drawerP = drawerId ? ALL.find(p => idOf(p) === drawerId) : null;
  const openDrawer = (p) => setDrawerId(idOf(p));
  const navDrawer = (d) => {
    const i = sortedFiltered.findIndex(p => idOf(p) === drawerId);
    const ni = Math.min(sortedFiltered.length - 1, Math.max(0, i + d));
    if (sortedFiltered[ni]) setDrawerId(idOf(sortedFiltered[ni]));
  };

  const jump = (v, patch) => {
    if (patch) {
      if (patch.source !== undefined) setSource(patch.source);
      if (patch.q !== undefined) setQ(patch.q);
    }
    setView(v);
  };

  const hasFilters = tech || dispo || source || status || scoreMin || favOnly || q;
  const clearFilters = () => { setTech(''); setDispo(''); setSource(''); setStatus(''); setScoreMin(0); setFavOnly(false); setQ(''); };

  const dispoCount = ALL.filter(p => p.dispo === 'Disponible').length;

  // bulk
  const selProfiles = ALL.filter(p => selected.has(idOf(p)));
  const bulkStatus = (v) => { selProfiles.forEach(p => store.setStatus(idOf(p), v)); window.__toast(`${selProfiles.length} profils → ${v}`); };
  const bulkExport = () => { exportCSV(selProfiles.length ? selProfiles : sortedFiltered, store.state); window.__toast('Export CSV téléchargé'); };
  const clearSel = () => setSelected(new Set());

  return (
    <div className="app">
      {/* ---------- TOPBAR ---------- */}
      <header className="topbar">
        <div className="brand">
          <div className="brand-mark"><Icon name="crosshair" size={22} stroke={1.8} /></div>
          <div className="brand-txt">
            <div className="brand-title">Chasseur de têtes</div>
            <div className="brand-sub">COBOL &amp; Java · Hauts-de-France</div>
          </div>
        </div>

        <div className="searchbox">
          <Icon name="search" size={17} />
          <input value={q} onChange={e => setQ(e.target.value)} placeholder="Rechercher un nom, une ville, une entreprise, une compétence…" />
          {q && <button className="iconbtn ghost" onClick={() => setQ('')}><Icon name="x" size={15} /></button>}
        </div>

        <div className="topbar-stats">
          <span className="stat-chip"><b>{ALL.length}</b> profils</span>
          <span className="stat-chip ok"><b>{dispoCount}</b> dispos</span>
        </div>
        <button className="btn btn-outline btn-sm" onClick={bulkExport}><Icon name="download" size={15} /> Export</button>
      </header>

      {/* ---------- NAV + FILTRES ---------- */}
      <div className="subbar">
        <nav className="vtabs">
          {VIEWS.map(v => (
            <button key={v.key} className={'vtab' + (view === v.key ? ' active' : '')} onClick={() => setView(v.key)}>
              <Icon name={v.icon} size={16} /> <span>{v.label}</span>
            </button>
          ))}
        </nav>

        {view !== 'dashboard' && (
          <div className="filters">
            <div className="fsel">
              <select value={tech} onChange={e => setTech(e.target.value)}>
                <option value="">Toutes techs</option><option>Java</option><option>COBOL</option>
              </select><Icon name="chevDown" size={13} />
            </div>
            <div className="fsel">
              <select value={dispo} onChange={e => setDispo(e.target.value)}>
                <option value="">Toute dispo.</option><option value="Disponible">Disponibles</option><option value="Inconnu">Dispo. inconnue</option>
              </select><Icon name="chevDown" size={13} />
            </div>
            <div className="fsel">
              <select value={source} onChange={e => setSource(e.target.value)}>
                <option value="">Toutes sources</option>
                {SOURCES.map(s => <option key={s} value={s}>{s}</option>)}
              </select><Icon name="chevDown" size={13} />
            </div>
            <div className="fsel">
              <select value={status} onChange={e => setStatus(e.target.value)}>
                <option value="">Tout statut</option>
                {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
              </select><Icon name="chevDown" size={13} />
            </div>
            <div className="fsel">
              <select value={scoreMin} onChange={e => setScoreMin(+e.target.value)}>
                {SCORE_OPTS.map(o => <option key={o.v} value={o.v}>{o.l}</option>)}
              </select><Icon name="chevDown" size={13} />
            </div>
            <button className={'chiptgl' + (favOnly ? ' on' : '')} onClick={() => setFavOnly(f => !f)}>
              <Icon name="star" size={14} fill={favOnly ? '#ffc300' : 'none'} stroke={favOnly ? 0 : 1.6} /> Favoris
            </button>
            {hasFilters && <button className="linkbtn sm" onClick={clearFilters}><Icon name="reset" size={13} /> Réinitialiser</button>}
            <span className="rescount">{filtered.length} résultat{filtered.length > 1 ? 's' : ''}</span>
          </div>
        )}
      </div>

      {/* ---------- CONTENU ---------- */}
      <main className="content">
        {view === 'dashboard' && <Dashboard profiles={ALL} store={store} onOpen={openDrawer} onJump={jump} />}
        {view === 'liste' && <ListeView profiles={sortedFiltered} store={store} />}
        {view === 'table' && <TableView profiles={filtered} store={store} onOpen={openDrawer} selected={selected} setSelected={setSelected} />}
        {view === 'pipeline' && <PipelineView profiles={filtered} store={store} onOpen={openDrawer} />}
        {view === 'cartes' && <CartesView profiles={sortedFiltered} store={store} onOpen={openDrawer} />}
      </main>

      <footer className="appfoot">Designé avec <span className="foot-heart">❤️</span> par Loulou</footer>

      {/* ---------- BULK BAR ---------- */}
      {selected.size > 0 && (
        <div className="bulkbar">
          <span className="bulk-n">{selected.size} sélectionné{selected.size > 1 ? 's' : ''}</span>
          <div className="bulk-sep" />
          <span className="bulk-lab">Statut :</span>
          <div className="fsel dark">
            <select defaultValue="" onChange={e => { if (e.target.value) { bulkStatus(e.target.value); e.target.value = ''; } }}>
              <option value="" disabled>Définir…</option>
              {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
            </select><Icon name="chevDown" size={13} />
          </div>
          <button className="btn btn-light btn-sm" onClick={bulkExport}><Icon name="download" size={14} /> Exporter</button>
          <button className="iconbtn ghost light" onClick={clearSel}><Icon name="x" size={16} /></button>
        </div>
      )}

      <Drawer p={drawerP} store={store} onClose={() => setDrawerId(null)} onNav={navDrawer} />
      <Toast msg={toastMsg} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
